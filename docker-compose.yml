services:
  app:
    build: .
    container_name: community-app
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET_KEY=NTRZSGpyeW5jUE83NjU0TmZyZEh2YzRHRjFwT0owdXk=
      - JWT_EXPIRATION=3600000
      - JWT_REFRESH_EXPIRATION=604800000
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/communitydb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=chanquete94
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=communitydb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=chanquete94
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
